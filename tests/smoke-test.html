    var tne = TABS_CONFIG['TNE'];
    var none = TABS_CONFIG['NONE'];
    // CAP montre ep2/ep3, cache e31/e32/e33
    var capOk = cap.show.indexOf('ep2') >= 0 && cap.hide.indexOf('e31') >= 0;
    // BAC montre e31/e32/e33, cache ep2/ep3
    var bacOk = bac.show.indexOf('e31') >= 0 && bac.hide.indexOf('ep2') >= 0;
    // TNE cache bilan
    var tneOk = tne.hide.indexOf('bilan') >= 0;
    // NONE cache tout sauf dashboard/tp/progression/config
    var noneOk = none.show.indexOf('dashboard') >= 0 && none.hide.indexOf('eleves') >= 0;
    return capOk && bacOk && tneOk && noneOk;
  });

  /* ═══════════════════════════════════════════════════════════
     Phase 13.1 — Securite & RGPD
     ═══════════════════════════════════════════════════════════ */
  cat('Securite — Cryptographie AES-256');

  assert('T338 — iwCrypto existe avec API complete', function(){
    return typeof window.iwCrypto === 'object'
      && typeof window.iwCrypto.encrypt === 'function'
      && typeof window.iwCrypto.decrypt === 'function'
      && typeof window.iwCrypto.hashPin === 'function'
      && typeof window.iwCrypto.verifyPin === 'function';
  });

  cat('Securite — Gestionnaire PIN');

  assert('T339 — iwPin existe avec API complete', function(){
    return typeof window.iwPin === 'object'
      && typeof window.iwPin.setupPin === 'function'
      && typeof window.iwPin.unlock === 'function'
      && typeof window.iwPin.lock === 'function'
      && typeof window.iwPin.showLockScreen === 'function'
      && typeof window.iwPin.factoryReset === 'function';
  });

  cat('TTia — Pseudonymisation RGPD v2 (chiffree)');

  assert('T340 — iwIdentity existe avec API complete v2', function(){
    return typeof window.iwIdentity === 'object'
      && typeof window.iwIdentity.register === 'function'
      && typeof window.iwIdentity.getCode === 'function'
      && typeof window.iwIdentity.anonymize === 'function'
      && typeof window.iwIdentity.deanonymize === 'function'
      && typeof window.iwIdentity.remove === 'function'
      && typeof window.iwIdentity.exportEleve === 'function'
      && typeof window.iwIdentity.purgeOld === 'function';
  });

  cat('TTia — Evaluation Mobile');

  assert('T341 — iwEvalMobile existe avec API complete', function(){
    return typeof window.iwEvalMobile === 'object'
      && typeof window.iwEvalMobile.show === 'function'
      && typeof window.iwEvalMobile.parse === 'function'
      && typeof window.iwEvalMobile.startDictee === 'function';
  });

  assert('T342 — iwEvalMobile.parse extrait competences + niveaux', function(){
    var r = window.iwEvalMobile.parse('Test soudage maitrise centrage parfait');
    return r && r.evaluations.length === 2
      && r.evaluations[0].competence === 'C3.4'
      && r.evaluations[0].niveau === 'M'
      && r.evaluations[1].competence === 'C3.5'
      && r.evaluations[1].niveau === 'PM';
  });

  assert('T343 — iwEvalMobile.parse gere texte vide', function(){
    return window.iwEvalMobile.parse('') === null;
  });

  cat('TTia — Google Drive API');

  assert('T344 — iwDrive existe avec API complete', function(){
    return typeof window.iwDrive === 'object'
      && typeof window.iwDrive.init === 'function'
      && typeof window.iwDrive.authorize === 'function'
      && typeof window.iwDrive.scanFolder === 'function'
      && typeof window.iwDrive.isConnected === 'function';
  });

  assert('T345 — iwDrive non connecte par defaut', function(){
    return window.iwDrive.isConnected() === false;
  });

  cat('RGPD — Conservation des donnees');

  assert('T346 — iwRetention existe avec API complete', function(){
    return typeof window.iwRetention === 'object'
      && typeof window.iwRetention.analyze === 'function'
      && typeof window.iwRetention.purge === 'function'
      && typeof window.iwRetention.export === 'function'
      && typeof window.iwRetention.check === 'function';
  });

  assert('T347 — iwRetention.RETENTION definit les durees legales', function(){
    var r = window.iwRetention.RETENTION;
    return r && r.identities === 400 && r.evaluations === 2190 && r.accessLog === 365;
  });

  /* ═══════════════════════════════════════════════════════════
     RÉSUMÉ
     ═══════════════════════════════════════════════════════════ */
  var sum = document.getElementById('summary');
  var total = passed + failed;
  sum.innerHTML = '<strong>' + passed + '</strong> / ' + total + ' tests OK'
    + (failed > 0 ? ' &mdash; <span style="color:#e74c3c;font-weight:bold">' + failed + ' FAIL</span>'
    : ' &mdash; <span style="color:#2ecc71;font-weight:bold">Tout est OK !</span>');

  // Titre du document avec le resultat
  document.title = (failed > 0 ? '\u274c ' + failed + ' FAIL' : '\u2705 ' + total + ' OK') + ' — Smoke Tests';
})();
</script>
