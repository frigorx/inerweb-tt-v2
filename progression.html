.app-header h1 { font-size:1rem; font-weight:800; }

.app-header .subtitle { font-size:.7rem; opacity:.8; font-weight:600; }
.back-link { color:#fff; text-decoration:none; font-size:.85rem; font-weight:700; opacity:.9; transition:opacity .2s; }

.container { max-width:900px; margin:0 auto; padding:1rem; }

.filter-bar {

.filter-bar label { font-weight:700; color:var(--bleu); font-size:.85rem; }

.filter-bar select:focus { border-color:var(--bleu2); outline:none; }

.empty-state {

.empty-state .ei { font-size:3rem; margin-bottom:.5rem; }

.tree-year {
  background:#fff; border-radius:var(--r); box-shadow:var(--ombre2);
  margin-bottom:.75rem; overflow:hidden;
}
.tree-year-header {
  display:flex; align-items:center; gap:.5rem; padding:.75rem 1rem;
  background:linear-gradient(135deg, var(--bleu) 0%, var(--bleu2) 100%);

  transition:var(--t);

.tree-year-header:hover { filter:brightness(1.1); }
.tree-year-header .chevron { transition:transform .2s; font-size:.7rem; }
.tree-year-header.open .chevron { transform:rotate(90deg); }
.tree-year-body { display:none; }
.tree-year-header.open + .tree-year-body { display:block; }

.tree-periode {
  border-bottom:1px solid var(--gris3);

.tree-periode:last-child { border-bottom:none; }
.tree-periode-header {
  display:flex; align-items:center; gap:.5rem; padding:.6rem 1rem .6rem 1.5rem;

.tree-periode-header:hover { background:#dce8f5; }
.tree-periode-header .chevron { transition:transform .2s; font-size:.65rem; }
.tree-periode-header.open .chevron { transform:rotate(90deg); }
.tree-periode-body { display:none; }
.tree-periode-header.open + .tree-periode-body { display:block; }

.tree-sequence {
  border-top:1px solid #eef2f7;

  display:flex; align-items:center; gap:.5rem; padding:.5rem 1rem .5rem 2.5rem;

.tree-sequence-body { display:none; padding:0 1rem .5rem 3rem; }
.tree-sequence-header.open + .tree-sequence-body { display:block; }

.comp-list { list-style:none; padding:0; }

  display:flex; align-items:center; gap:.5rem; padding:.35rem .5rem;

.comp-poids {

.tp-item {

.tp-item::before { content:"🔧"; font-size:.7rem; }

               comps:['CT2','CT3'],
               tp:['TP5 — Analyse système froid','TP6 — Mesures électriques']},
              {nom:'S4 — Communication',epreuve:'modules',
               comps:['CT5'],
               tp:['TP7 — Exposé métier','TP8 — Rapport de stage']}
            ]
          },
          {
            nom:'PFMP — Stage découverte',
            sequences:[
              {nom:'PFMP — Observation',epreuve:'modules',
               comps:['CT1','CT4','CT5'],
               tp:['Activités entreprise — Découverte']}
            ]
          }
        ]
      }
    ]
  }
};

/* ─── COULEURS EPREUVES ─── */
var EP_COLORS={
  'EP2':'#2d5a8c','EP3':'#16a085',
  'E31':'#2d5a8c','E32':'#8e44ad','E33':'#6c3483',
  'modules':'#16a085'
};

/* ─── CHARGEMENT DONNEES LOCALSTORAGE ─── */
var SK='inerweb-tt-fe-v1';
var SCLASSES='inerweb-tt-fe-classes';
var storedData=null;
var storedClasses=null;

function loadData(){
  try{
    var raw=localStorage.getItem(SK);
    storedData=raw?JSON.parse(raw):null;
  }catch(e){storedData=null;}
  try{
    var rc=localStorage.getItem(SCLASSES);
    storedClasses=rc?JSON.parse(rc):null;
  }catch(e){storedClasses=null;}
}

function getStudents(){
  if(!storedData)return[];
  // Format v1 : {students:[...], validations:{...}, ...}
  if(Array.isArray(storedData.students))return storedData.students;
  if(Array.isArray(storedData))return storedData;
  return[];
}

function getValidations(){
  if(!storedData)return{};
  return storedData.validations||{};
}

function getFiliere(student){
  if(student.referentiel&&FILIERES[student.referentiel])return student.referentiel;
  var cl=(student.classe||'').toLowerCase();
  if(cl.includes('cap')||cl.includes('ifca'))return'CAP_IFCA';
  if(cl.includes('mfer')||cl.includes('bac'))return'BAC_MFER';
  if(cl.includes('tne')||cl.includes('2nde'))return'TNE';
  return'CAP_IFCA';
}

/* ─── CONSTRUCTION FILTRES ─── */
function buildFilters(){
  var students=getStudents();
  var classeSet=new Set();
  var filiereSet=new Set();

  // Classes depuis les donnees
  students.forEach(function(s){
    if(s.classe)classeSet.add(s.classe);
    filiereSet.add(getFiliere(s));
  });
  // Classes depuis la config
  if(storedClasses&&Array.isArray(storedClasses)){
    storedClasses.forEach(function(c){classeSet.add(c);});
  }
  // Classes par defaut des filieres
  Object.keys(FILIERES).forEach(function(k){
    FILIERES[k].classes.forEach(function(c){classeSet.add(c);});
    filiereSet.add(k);
  });

  var selClasse=document.getElementById('classeFilter');
  var selFiliere=document.getElementById('filiereFilter');

  Array.from(classeSet).sort().forEach(function(c){
    var o=document.createElement('option');
    o.value=c;o.textContent=c;
    selClasse.appendChild(o);
  });

  filiereSet.forEach(function(k){
    var fil=FILIERES[k];
    if(!fil)return;
    var o=document.createElement('option');
    o.value=k;o.textContent=fil.abrege;
    selFiliere.appendChild(o);
  });
}

/* ─── RENDU ARBORESCENCE ─── */
function renderTree(){
  var container=document.getElementById('progressionTree');
  var classeVal=document.getElementById('classeFilter').value;
  var filiereVal=document.getElementById('filiereFilter').value;
  var students=getStudents();
  var validations=getValidations();

  // Determiner les filieres a afficher
  var filieresToShow=[];
  if(filiereVal!=='all'){
    filieresToShow=[filiereVal];
  } else if(classeVal!=='all'){
    // Determiner la filiere de la classe
    var fakeStudent={classe:classeVal};
    filieresToShow=[getFiliere(fakeStudent)];
  } else {
    filieresToShow=Object.keys(FILIERES);
  }

  // Statistiques
  var filteredStudents=students.filter(function(s){
    if(classeVal!=='all'&&s.classe!==classeVal)return false;
    if(filiereVal!=='all'&&getFiliere(s)!==filiereVal)return false;
    return true;
  });

  var infoBar=document.getElementById('infoBar');
  infoBar.innerHTML='<span class="stat">👥 '+filteredStudents.length+' eleve(s)</span>'
    +'<span>|</span><span class="stat">📋 '+filieresToShow.length+' filiere(s)</span>';

  if(!filieresToShow.length){
    container.innerHTML='<div class="empty-state"><div class="ei">📭</div><p>Aucune donnee a afficher</p></div>';
    return;
  }

  var html='';

  filieresToShow.forEach(function(filKey){
    var fil=FILIERES[filKey];
    var prog=PROGRESSION_DEFAUT[filKey];
    if(!fil||!prog)return;

    prog.annees.forEach(function(annee,ai){
      html+='<div class="tree-year">';
      html+='<div class="tree-year-header open" data-toggle="year">';
      html+='<span class="chevron">▶</span>';
      html+='<span>'+esc(annee.nom)+'</span>';
      html+='<span class="filiere-badge" style="background:'+fil.couleur+'">'+esc(fil.abrege)+'</span>';
      html+='</div>';
      html+='<div class="tree-year-body" style="display:block">';

      annee.periodes.forEach(function(periode,pi){
        html+='<div class="tree-periode">';
        html+='<div class="tree-periode-header'+(pi===0?' open':'')+'" data-toggle="periode">';
        html+='<span class="chevron">▶</span>';
        html+='<span>'+esc(periode.nom)+'</span>';
        html+='</div>';
        html+='<div class="tree-periode-body"'+(pi===0?' style="display:block"':'')+'>';

        periode.sequences.forEach(function(seq,si){
          var epColor=EP_COLORS[seq.epreuve]||'var(--gris)';
          html+='<div class="tree-sequence">';
          html+='<div class="tree-sequence-header" data-toggle="sequence">';
          html+='<span class="chevron">▶</span>';
          html+='<span class="badge-ep" style="background:'+epColor+'">'+esc(seq.epreuve||'—')+'</span>';
          html+='<span>'+esc(seq.nom)+'</span>';
          html+='</div>';
          html+='<div class="tree-sequence-body">';

          // TP
          if(seq.tp&&seq.tp.length){
            seq.tp.forEach(function(tp){
              html+='<div class="tp-item">'+esc(tp)+'</div>';
            });
          }

          // Competences
          var allComps=(fil.comps||{})[seq.epreuve]||[];
          var seqComps=seq.comps||[];
          if(seqComps.length){
            html+='<ul class="comp-list">';
            seqComps.forEach(function(compCode){
              var comp=allComps.find(function(c){return c.code===compCode;});
              if(!comp)return;
              html+='<li class="comp-item">';
              html+='<span class="comp-code">'+esc(comp.code)+'</span>';
              html+='<span class="comp-nom" title="'+esc(comp.full||comp.nom)+'">'+esc(comp.full||comp.nom)+'</span>';
              if(comp.obl)html+='<span class="comp-obl">OBL</span>';
              html+='<span class="comp-poids">×'+comp.poids+'</span>';
              html+='</li>';
            });
            html+='</ul>';
          }

          html+='</div></div>'; // .tree-sequence-body + .tree-sequence
        });

        html+='</div></div>'; // .tree-periode-body + .tree-periode
      });

      html+='</div></div>'; // .tree-year-body + .tree-year
    });
  });

  container.innerHTML=html;
}

function esc(s){
  if(s==null)return'';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ─── EVENT LISTENERS DELEGUES ─── */
// Filtres
document.getElementById('main-content').addEventListener('change',function(e){
  var sel=e.target.closest('select');
  if(sel&&(sel.id==='classeFilter'||sel.id==='filiereFilter')){
    renderTree();
  }
});

// Toggle arborescence (delegation)
document.getElementById('progressionTree').addEventListener('click',function(e){
  var header=e.target.closest('[data-toggle]');
  if(!header)return;
  header.classList.toggle('open');
  var body=header.nextElementSibling;
  if(body){
    body.style.display=body.style.display==='none'?'block':'none';
  }
});

/* ─── INIT ─── */
loadData();
buildFilters();
renderTree();

})();
</script>
</body>
</html>
